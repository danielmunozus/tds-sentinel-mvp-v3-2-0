<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="sentinel_mobile">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>TDS Sentinel</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Content Security Policy — TDS Sentinel
    Requerido para Flutter Web (CanvasKit) + Google Fonts (Montserrat).

    Notas:
    · 'unsafe-inline' y 'unsafe-eval' en script-src son obligatorios para CanvasKit.
    · blob: y data: son obligatorios para workers y assets de Flutter Web.
    · fonts.googleapis.com (style-src)  → sirve el CSS @font-face de Montserrat.
    · fonts.gstatic.com  (font-src)     → sirve los archivos .woff2 reales.
    · fonts.gstatic.com  (connect-src)  → Flutter Web carga fuentes via fetch().
    · Sin comodines — solo dominios de confianza con https:// explícito.

    IMPORTANTE: cuando Flask sirve la app, el header HTTP Content-Security-Policy
    de app.py tiene precedencia sobre esta etiqueta meta. Mantener ambas sincronizadas.
    Fuente de verdad del backend: backend/app.py → apply_security_headers()
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self' blob: data:;
    script-src  'self' 'unsafe-inline' 'unsafe-eval' blob:;
    style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
    img-src     'self' data: blob:;
    font-src    'self' data: https://fonts.gstatic.com;
    connect-src 'self' https://fonts.gstatic.com;
    worker-src  'self' blob:;
  ">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
